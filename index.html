<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bildbanken</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Arial, Helvetica, sans-serif;
      background: #f5f5f2;
      color: #1e2528;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
    }

    header {
      background: #ffffff;
      border-bottom: 1px solid #d9ddd8;
      padding: 24px clamp(16px, 4vw, 48px);
      position: sticky;
      top: 0;
      z-index: 2;
    }

    h1 {
      font-size: clamp(1.7rem, 3vw, 2.4rem);
      line-height: 1.1;
      margin: 0 0 16px;
    }

    .tools {
      align-items: center;
      display: flex;
      gap: 12px;
      max-width: 860px;
    }

    input {
      border: 1px solid #b7c0bd;
      border-radius: 6px;
      flex: 1;
      font: inherit;
      min-width: 0;
      padding: 11px 12px;
    }

    .count {
      color: #536160;
      font-size: 0.95rem;
      white-space: nowrap;
    }

    main {
      padding: 24px clamp(16px, 4vw, 48px) 48px;
    }

    .grid {
      display: grid;
      gap: 18px;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
    }

    figure {
      background: #ffffff;
      border: 1px solid #d9ddd8;
      border-radius: 8px;
      cursor: zoom-in;
      margin: 0;
      overflow: hidden;
    }

    img {
      aspect-ratio: 4 / 3;
      background: #e2e5e1;
      display: block;
      height: auto;
      object-fit: cover;
      width: 100%;
    }

    figcaption {
      display: grid;
      gap: 6px;
      padding: 12px;
    }

    .name {
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    .meta {
      color: #536160;
      font-size: 0.9rem;
      overflow-wrap: anywhere;
    }

    .meta a {
      color: inherit;
    }

    .empty {
      color: #536160;
      font-size: 1.1rem;
      margin: 32px 0;
    }

    dialog {
      background: #111;
      border: 0;
      color: #fff;
      height: 100%;
      max-height: none;
      max-width: none;
      padding: 0;
      width: 100%;
    }

    dialog::backdrop {
      background: #111;
    }

    .viewer {
      display: grid;
      grid-template-rows: auto 1fr auto;
      height: 100%;
    }

    .viewer-bar {
      align-items: center;
      display: flex;
      gap: 12px;
      justify-content: space-between;
      padding: 12px clamp(12px, 3vw, 28px);
    }

    .viewer-title {
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    button {
      background: #fff;
      border: 0;
      border-radius: 6px;
      color: #111;
      cursor: pointer;
      font: inherit;
      padding: 9px 12px;
    }

    .viewer-stage {
      cursor: grab;
      overflow: hidden;
      position: relative;
      touch-action: none;
    }

    .viewer-stage.dragging {
      cursor: grabbing;
    }

    .viewer-image {
      background: #111;
      left: 0;
      position: absolute;
      top: 0;
      transform-origin: 0 0;
      user-select: none;
      -webkit-user-drag: none;
    }

    .viewer-meta {
      color: #d7d7d7;
      overflow-wrap: anywhere;
      padding: 12px clamp(12px, 3vw, 28px);
    }

    .viewer-meta a {
      color: #ffffff;
    }
  </style>
</head>
<body>
  <header>
    <h1>Bildbanken</h1>
    <div class="tools">
      <input id="search" type="search" placeholder="Sök på katalog eller filnamn" autocomplete="off">
      <span class="count" id="count"></span>
    </div>
  </header>
  <main>
    <div class="grid" id="grid"></div>
    <p class="empty" id="empty" hidden>Inga bilder matchar sökningen.</p>
  </main>
  <dialog id="viewer">
    <div class="viewer">
      <div class="viewer-bar">
        <div class="viewer-title" id="viewer-title"></div>
        <button id="viewer-close" type="button">Stäng</button>
      </div>
      <div class="viewer-stage" id="viewer-stage">
        <img class="viewer-image" id="viewer-image" alt="">
      </div>
      <div class="viewer-meta" id="viewer-meta"></div>
    </div>
  </dialog>

  <script>
    const state = {
      photos: [],
      photographers: {},
      viewer: {
        photo: null,
        scale: 1,
        x: 0,
        y: 0,
        width: 0,
        height: 0,
        pointerId: null,
        dragStartX: 0,
        dragStartY: 0,
        startX: 0,
        startY: 0
      }
    };

    const grid = document.querySelector("#grid");
    const search = document.querySelector("#search");
    const count = document.querySelector("#count");
    const empty = document.querySelector("#empty");
    const viewer = document.querySelector("#viewer");
    const viewerStage = document.querySelector("#viewer-stage");
    const viewerImage = document.querySelector("#viewer-image");
    const viewerTitle = document.querySelector("#viewer-title");
    const viewerMeta = document.querySelector("#viewer-meta");
    const viewerClose = document.querySelector("#viewer-close");

    init();

    async function init() {
      const [photographers, tree] = await Promise.all([
        fetchJson("photographers.json", {}),
        fetchJson("photos.json", {})
      ]);
      state.photographers = photographers;
      state.photos = flattenPhotos(tree).sort(compareFreshness);
      search.value = queryFromUrl();
      search.addEventListener("input", () => {
        updateQueryUrl(search.value);
        render();
      });
      viewerClose.addEventListener("click", closeViewer);
      viewer.addEventListener("click", (event) => {
        if (event.target === viewer) closeViewer();
      });
      viewerImage.addEventListener("load", resetViewerTransform);
      viewerStage.addEventListener("wheel", zoomViewer, { passive: false });
      viewerStage.addEventListener("pointerdown", startViewerDrag);
      viewerStage.addEventListener("pointermove", dragViewer);
      viewerStage.addEventListener("pointerup", stopViewerDrag);
      viewerStage.addEventListener("pointercancel", stopViewerDrag);
      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && viewer.open) closeViewer();
      });
      window.addEventListener("resize", () => {
        if (viewer.open) resetViewerTransform();
      });
      render();
    }

    async function fetchJson(url, fallback) {
      try {
        const response = await fetch(url, { cache: "no-store" });
        if (!response.ok) throw new Error(response.statusText);
        return await response.json();
      } catch (error) {
        console.warn(`Kunde inte läsa ${url}`, error);
        return fallback;
      }
    }

    function flattenPhotos(tree) {
      const photos = [];
      walk(tree, []);
      return photos;

      function walk(node, path) {
        for (const [name, value] of Object.entries(node || {})) {
          if (Array.isArray(value)) {
            const [key, photographerKey, timestamp] = photoValue(value);
            const folders = path.slice(1);
            const displayFolders = folders.map(displayName);
            const displayPhotoName = displayName(name);
            photos.push({
              name,
              displayName: displayPhotoName,
              key,
              photographerKey,
              folders,
              displayFolders,
              date: findDate([...path, name]),
              timestamp,
              haystack: [...folders, name, ...displayFolders, displayPhotoName].join(" ").toLowerCase()
            });
          } else {
            walk(value, [...path, name]);
          }
        }
      }
    }

    function findDate(parts) {
      for (const part of parts) {
        const match = String(part).match(/\d{4}-\d{2}-\d{2}/);
        if (match) return match[0];
      }
      const year = parts.find((part) => /^\d{4}$/.test(String(part)));
      return year ? `${year}-00-00` : "0000-00-00";
    }

    function render() {
      const query = normalize(search.value);
      const terms = query.split(/\s+/).filter(Boolean);
      const matches = rankMatches(state.photos, terms);
      const visible = query ? matches : matches.slice(0, 10);

      grid.replaceChildren(...visible.map(renderPhoto));
      empty.hidden = visible.length > 0;
      count.textContent = query ? `${visible.length} av ${state.photos.length}` : `${visible.length} senaste`;
    }

    function renderPhoto(photo) {
      const figure = document.createElement("figure");
      const image = document.createElement("img");
      const caption = document.createElement("figcaption");
      const name = document.createElement("div");
      const meta = document.createElement("div");

      image.src = imageUrl(photo);
      image.alt = photo.displayName;
      image.loading = "lazy";

      name.className = "name";
      name.textContent = photo.displayName;

      meta.className = "meta";
      renderPhotoMeta(meta, photo);

      caption.append(name, meta);
      figure.append(image, caption);
      figure.addEventListener("click", () => openPhoto(photo));
      return figure;
    }

    function rankMatches(photos, terms) {
      if (terms.length === 0) return photos;

      return photos
        .map((photo) => ({ photo, rank: matchRank(photo, terms) }))
        .filter((entry) => entry.rank !== null)
        .sort((a, b) => compareRanks(a.rank, b.rank) || compareFreshness(a.photo, b.photo))
        .map((entry) => entry.photo);
    }

    function matchRank(photo, terms) {
      const haystack = photo.haystack;
      const positions = terms.map((term) => haystack.indexOf(term));
      const matchedPositions = positions.filter((position) => position !== -1);
      if (matchedPositions.length === 0) return null;
      if (matchedPositions.length === terms.length) return [0, Math.min(...matchedPositions)];

      const firstMatchedTerm = positions.findIndex((position) => position !== -1);
      return [firstMatchedTerm + 1, positions[firstMatchedTerm]];
    }

    function compareRanks(left, right) {
      return left[0] - right[0] || left[1] - right[1];
    }

    function normalize(value) {
      return value.trim().toLowerCase();
    }

    function queryFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return params.get("q") || params.get("query") || "";
    }

    function updateQueryUrl(value) {
      const params = new URLSearchParams(window.location.search);
      const query = value.trim();
      if (query) {
        params.set("q", query);
      } else {
        params.delete("q");
        params.delete("query");
      }
      const next = `${window.location.pathname}${params.toString() ? `?${params}` : ""}${window.location.hash}`;
      window.history.replaceState(null, "", next);
    }

    function openPhoto(photo) {
      const viewerUrl = driveViewerUrl(photo);
      if (viewerUrl) {
        window.location.href = viewerUrl;
        return;
      }
      openViewer(photo);
    }

    function openViewer(photo) {
      state.viewer.photo = photo;
      viewerImage.src = imageUrl(photo, 2400);
      viewerImage.alt = photo.displayName;
      viewerTitle.textContent = photo.displayName;
      setViewerMeta(photo);
      viewer.showModal();
      readExif(photo);
    }

    function closeViewer() {
      viewer.close();
      viewerImage.removeAttribute("src");
      state.viewer.photo = null;
      viewerStage.classList.remove("dragging");
    }

    function setViewerMeta(photo, exif = "") {
      renderPhotoMeta(viewerMeta, photo, exif);
    }

    function resetViewerTransform() {
      if (!viewerImage.naturalWidth || !viewerImage.naturalHeight) return;
      const bounds = viewerStage.getBoundingClientRect();
      const scale = Math.min(bounds.width / viewerImage.naturalWidth, bounds.height / viewerImage.naturalHeight, 1);
      state.viewer.scale = 1;
      state.viewer.width = viewerImage.naturalWidth * scale;
      state.viewer.height = viewerImage.naturalHeight * scale;
      state.viewer.x = (bounds.width - state.viewer.width) / 2;
      state.viewer.y = (bounds.height - state.viewer.height) / 2;
      applyViewerTransform();
    }

    function applyViewerTransform() {
      const view = state.viewer;
      viewerImage.style.width = `${view.width}px`;
      viewerImage.style.height = `${view.height}px`;
      viewerImage.style.transform = `translate(${view.x}px, ${view.y}px) scale(${view.scale})`;
    }

    function zoomViewer(event) {
      if (!viewerImage.naturalWidth || !viewerImage.naturalHeight) return;
      event.preventDefault();
      const bounds = viewerStage.getBoundingClientRect();
      const pointerX = event.clientX - bounds.left;
      const pointerY = event.clientY - bounds.top;
      const view = state.viewer;
      const nextScale = clamp(view.scale * Math.exp(-event.deltaY * 0.001), 0.5, 8);
      const imageX = (pointerX - view.x) / view.scale;
      const imageY = (pointerY - view.y) / view.scale;
      view.x = pointerX - imageX * nextScale;
      view.y = pointerY - imageY * nextScale;
      view.scale = nextScale;
      applyViewerTransform();
    }

    function startViewerDrag(event) {
      if (event.button !== 0 || !viewerImage.naturalWidth) return;
      const view = state.viewer;
      view.pointerId = event.pointerId;
      view.dragStartX = event.clientX;
      view.dragStartY = event.clientY;
      view.startX = view.x;
      view.startY = view.y;
      viewerStage.classList.add("dragging");
      viewerStage.setPointerCapture(event.pointerId);
    }

    function dragViewer(event) {
      const view = state.viewer;
      if (view.pointerId !== event.pointerId) return;
      view.x = view.startX + event.clientX - view.dragStartX;
      view.y = view.startY + event.clientY - view.dragStartY;
      applyViewerTransform();
    }

    function stopViewerDrag(event) {
      const view = state.viewer;
      if (view.pointerId !== event.pointerId) return;
      view.pointerId = null;
      viewerStage.classList.remove("dragging");
      if (viewerStage.hasPointerCapture(event.pointerId)) {
        viewerStage.releasePointerCapture(event.pointerId);
      }
    }

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    async function readExif(photo) {
      const url = imageUrl(photo, 2400);
      if (!canReadExifUrl(url)) return;

      try {
        const response = await fetch(url, { cache: "force-cache" });
        if (!response.ok) return;
        const tags = parseExif(await response.arrayBuffer());
        if (state.viewer.photo === photo && tags.length > 0) {
          setViewerMeta(photo, tags.join(" • "));
        }
      } catch (error) {
        console.warn("Kunde inte läsa EXIF", error);
      }
    }

    function canReadExifUrl(url) {
      const parsed = new URL(url, window.location.href);
      return parsed.origin === window.location.origin;
    }

    function parseExif(buffer) {
      const view = new DataView(buffer);
      if (view.byteLength < 4 || view.getUint16(0) !== 0xffd8) return [];

      let offset = 2;
      while (offset + 4 < view.byteLength) {
        if (view.getUint8(offset) !== 0xff) return [];
        const marker = view.getUint8(offset + 1);
        const size = view.getUint16(offset + 2);
        if (marker === 0xe1 && ascii(view, offset + 4, 6) === "Exif\0\0") {
          return parseTiffExif(view, offset + 10);
        }
        offset += 2 + size;
      }
      return [];
    }

    function parseTiffExif(view, tiffOffset) {
      const littleEndian = ascii(view, tiffOffset, 2) === "II";
      const read16 = (offset) => view.getUint16(offset, littleEndian);
      const read32 = (offset) => view.getUint32(offset, littleEndian);
      const firstIfd = tiffOffset + read32(tiffOffset + 4);
      const tags = readIfd(view, tiffOffset, firstIfd, littleEndian, read16, read32);
      const exifOffset = tags.get(0x8769);
      const exifTags = exifOffset ? readIfd(view, tiffOffset, tiffOffset + exifOffset, littleEndian, read16, read32) : new Map();

      return [
        textTag(tags, 0x010f, "Kamera"),
        textTag(tags, 0x0110, ""),
        textTag(exifTags, 0x9003, "Tagen"),
        rationalTag(exifTags, 0x829a, "Tid", "s"),
        apertureTag(exifTags, 0x829d),
        isoTag(exifTags),
        rationalTag(exifTags, 0x920a, "Brännvidd", " mm"),
        signedRationalTag(exifTags, 0x9204, "Exponeringskompensation", " EV"),
        textTag(exifTags, 0xa434, "Objektiv"),
        pixelSizeTag(exifTags)
      ].filter(Boolean);
    }

    function readIfd(view, tiffOffset, ifdOffset, littleEndian, read16, read32) {
      const result = new Map();
      if (ifdOffset <= 0 || ifdOffset + 2 > view.byteLength) return result;
      const count = read16(ifdOffset);
      for (let index = 0; index < count; index += 1) {
        const entry = ifdOffset + 2 + index * 12;
        if (entry + 12 > view.byteLength) break;
        const tag = read16(entry);
        const type = read16(entry + 2);
        const amount = read32(entry + 4);
        const valueOffset = entry + 8;
        result.set(tag, exifValue(view, tiffOffset, valueOffset, type, amount, littleEndian, read16, read32));
      }
      return result;
    }

    function exifValue(view, tiffOffset, valueOffset, type, amount, littleEndian, read16, read32) {
      const bytes = { 1: 1, 2: 1, 3: 2, 4: 4, 5: 8, 7: 1, 9: 4, 10: 8 }[type] || 1;
      const offset = bytes * amount <= 4 ? valueOffset : tiffOffset + read32(valueOffset);
      if (offset < 0 || offset >= view.byteLength) return null;
      if (type === 2) return ascii(view, offset, amount).replace(/\0+$/, "").trim();
      if (type === 3) return read16(offset);
      if (type === 4) return read32(offset);
      if (type === 5) return read32(offset) / Math.max(read32(offset + 4), 1);
      if (type === 9) return view.getInt32(offset, littleEndian);
      if (type === 10) return view.getInt32(offset, littleEndian) / Math.max(view.getInt32(offset + 4, littleEndian), 1);
      return null;
    }

    function textTag(tags, key, label) {
      const value = tags.get(key);
      if (!value) return "";
      return label ? `${label}: ${value}` : value;
    }

    function rationalTag(tags, key, label, suffix) {
      const value = tags.get(key);
      if (!value) return "";
      const formatted = value < 1 ? `1/${Math.round(1 / value)}` : trimNumber(value);
      return `${label}: ${formatted}${suffix}`;
    }

    function signedRationalTag(tags, key, label, suffix) {
      const value = tags.get(key);
      if (value === null || value === undefined) return "";
      return `${label}: ${trimNumber(value)}${suffix}`;
    }

    function apertureTag(tags) {
      const value = tags.get(0x829d);
      return value ? `Bländare: f/${trimNumber(value)}` : "";
    }

    function isoTag(tags) {
      const value = tags.get(0x8827);
      return value ? `ISO: ${value}` : "";
    }

    function pixelSizeTag(tags) {
      const width = tags.get(0xa002);
      const height = tags.get(0xa003);
      return width && height ? `EXIF-storlek: ${width} x ${height}` : "";
    }

    function trimNumber(value) {
      return Number(value.toFixed(2)).toString();
    }

    function ascii(view, offset, length) {
      let text = "";
      for (let index = 0; index < length && offset + index < view.byteLength; index += 1) {
        text += String.fromCharCode(view.getUint8(offset + index));
      }
      return text;
    }

    function photographerName(key) {
      return state.photographers[key]?.[0] || key;
    }

    function photoValue(value) {
      if (value.length >= 2 && typeof value[0] === "string") {
        return [value[0], value[1], Number(value[2]) || 0];
      }
      return [value[2], value[3], Number(value[4]) || 0];
    }

    function compareFreshness(left, right) {
      return right.timestamp - left.timestamp || right.date.localeCompare(left.date);
    }

    function formatTimestamp(secondsSince1900) {
      const unixMilliseconds = (secondsSince1900 - 2208988800) * 1000;
      const date = new Date(unixMilliseconds);
      if (Number.isNaN(date.getTime())) return "";
      const year = date.getUTCFullYear();
      const month = pad2(date.getUTCMonth() + 1);
      const day = pad2(date.getUTCDate());
      const hours = pad2(date.getUTCHours());
      const minutes = pad2(date.getUTCMinutes());
      const seconds = pad2(date.getUTCSeconds());
      return `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
    }

    function pad2(value) {
      return String(value).padStart(2, "0");
    }

    function renderPhotoMeta(container, photo, exif = "") {
      container.replaceChildren();
      const entries = photo.folders.map((folder, index) => ({
        text: photo.displayFolders[index],
        source: folder,
        linkTournaments: true
      }));
      entries.push({ text: photographerTimestampText(photo), lineBreakBefore: true });
      if (exif) entries.push({ text: exif });

      for (const entry of entries.filter((item) => item.text)) {
        if (container.childNodes.length > 0) {
          if (entry.lineBreakBefore) {
            container.append(document.createElement("br"));
          } else {
            container.append(document.createTextNode(" • "));
          }
        }
        if (entry.linkTournaments) {
          appendTextWithTournamentLinks(container, entry.text, entry.source);
        } else {
          container.append(document.createTextNode(entry.text));
        }
      }
    }

    function photographerTimestampText(photo) {
      const photographer = photo.photographerKey || photographerName(photo.photographerKey);
      if (!photo.timestamp) return photographer;
      return `${photographer} @ ${formatTimestamp(photo.timestamp)}`;
    }

    function appendTextWithTournamentLinks(container, text, source) {
      const tournamentPattern = /T(\d{5})/g;
      let start = 0;
      for (const match of source.matchAll(tournamentPattern)) {
        const code = match[0];
        const id = match[1];
        const displayIndex = text.indexOf(code, start);
        if (displayIndex === -1) continue;
        if (displayIndex > start) {
          container.append(document.createTextNode(text.slice(start, displayIndex)));
        }
        const link = document.createElement("a");
        link.href = `https://member.schack.se/ShowTournamentServlet?id=${encodeURIComponent(id)}&listingtype=2`;
        link.target = "_blank";
        link.rel = "noopener";
        link.textContent = "Resultat";
        link.addEventListener("click", (event) => event.stopPropagation());
        container.append(link);
        start = displayIndex + code.length;
      }
      if (start < text.length) {
        container.append(document.createTextNode(text.slice(start)));
      }
    }

    function displayName(value) {
      return String(value)
        .replaceAll("_", " ")
        .replaceAll("/", "•")
        .replaceAll("|", "•")
        .replaceAll("Vy-", "")
        .replace(/60plus/gi, "60+")
        .replace(/\s+16x9\s+/gi, " ")
        .replace(/\.jpg$/i, "")
        .replace(/\s+/g, " ")
        .trim();
    }

    function imageUrl(photo, size = 1200) {
      if (/^https?:\/\//.test(photo.key)) return photo.key;
      if (/^[A-Za-z0-9_-]{10,}$/.test(photo.key)) {
        return `https://drive.google.com/thumbnail?id=${encodeURIComponent(photo.key)}&sz=w${size}`;
      }
      return encodeURI(photo.key);
    }

    function driveViewerUrl(photo) {
      if (/^[A-Za-z0-9_-]{10,}$/.test(photo.key)) {
        return `https://drive.google.com/file/d/${encodeURIComponent(photo.key)}/view?usp=drive_link`;
      }
      return "";
    }

  </script>
</body>
</html>
